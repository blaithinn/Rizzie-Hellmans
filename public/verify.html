<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certify Your Rizz 💘🔥 — Rizz Me Through The Phone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800;900&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <style>
    :root{
      --pink:#ff2db6;--purple:#a24bff;--ink:#2a0b3f;--soft:#6b4a82;--line:#f0c8ec;--lav:#f3e6ff;
      --grad:linear-gradient(120deg,#ff2db6 0%,#c13bff 52%,#7b2cff 100%);
      --gloss:linear-gradient(180deg,rgba(255,255,255,.55),rgba(255,255,255,.05) 48%,rgba(0,0,0,.06));
      --mono:"Space Mono",ui-monospace,Consolas,monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{
      font-family:"Nunito",system-ui,sans-serif;color:var(--ink);min-height:100dvh;
      display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow-x:hidden;
      background:
        radial-gradient(1100px 700px at 12% -10%,#ffd9f3,rgba(255,217,243,0) 60%),
        radial-gradient(1000px 800px at 110% 10%,#e4ccff,rgba(228,204,255,0) 55%),
        linear-gradient(160deg,#ffe6f6,#f1e0ff 55%,#ffe9f8);
      -webkit-font-smoothing:antialiased;
    }
    body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:
        radial-gradient(circle at 20% 30%,rgba(255,45,182,.07) 0 2px,transparent 3px),
        radial-gradient(circle at 70% 60%,rgba(162,75,255,.07) 0 2px,transparent 3px);
      background-size:140px 140px,180px 180px;}
    .floaty{position:fixed;opacity:.5;z-index:0;pointer-events:none;animation:fl linear infinite;filter:drop-shadow(0 4px 6px rgba(255,45,182,.3));}
    @keyframes fl{0%{transform:translateY(20px) rotate(0);opacity:0}15%{opacity:.5}100%{transform:translateY(-110vh) rotate(28deg);opacity:0}}
    @media (prefers-reduced-motion:reduce){.floaty{display:none}}

    .card{position:relative;z-index:1;background:rgba(255,255,255,.74);backdrop-filter:blur(14px);
      border:1px solid #fff;border-radius:28px;padding:34px;width:100%;max-width:600px;
      box-shadow:0 18px 50px -18px rgba(122,22,168,.55);overflow:hidden;}
    .card::before{content:"";position:absolute;top:0;left:0;right:0;height:7px;background:var(--grad);}

    .brand{text-align:center;margin-bottom:22px;}
    .brand .em{font-size:2.6rem;filter:drop-shadow(0 4px 8px rgba(255,45,182,.4));}
    h1{font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.7rem;line-height:1.05;margin-top:8px;
      background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.5px;}
    .subtitle{font-size:.9rem;color:var(--soft);font-weight:700;margin-top:8px;line-height:1.5;text-align:center;}
    .subtitle b{color:var(--pink);}

    label{display:block;font-weight:800;font-size:.74rem;text-transform:uppercase;letter-spacing:.9px;color:#6a1fd0;margin:22px 0 7px;}
    input[type="text"]{width:100%;border:2px solid var(--line);background:#fff;border-radius:14px;padding:13px 15px;
      color:var(--ink);font-size:.92rem;font-family:var(--mono);outline:none;transition:border-color .15s,box-shadow .15s;}
    input[type="text"]:focus{border-color:var(--pink);box-shadow:0 0 0 4px rgba(255,45,182,.16);}
    input[type="text"]::placeholder{color:#cba9cf;}

    button#verifyBtn{margin-top:16px;width:100%;border:none;border-radius:999px;padding:15px;cursor:pointer;position:relative;overflow:hidden;
      font-family:"Fredoka",sans-serif;font-weight:600;font-size:1.1rem;color:#fff;background:var(--grad);
      box-shadow:0 10px 30px -8px rgba(170,30,180,.55),inset 0 1px 0 rgba(255,255,255,.6);
      text-shadow:0 1px 2px rgba(120,10,120,.35);transition:transform .12s,filter .15s;}
    button#verifyBtn::after{content:"";position:absolute;inset:0;background:var(--gloss);border-radius:inherit;pointer-events:none;}
    button#verifyBtn:hover:not(:disabled){transform:translateY(-2px);filter:saturate(1.15) brightness(1.04);}
    button#verifyBtn:active:not(:disabled){transform:translateY(0) scale(.98);}
    button#verifyBtn:disabled{opacity:.55;cursor:not-allowed;}

    #result{margin-top:20px;}
    .status-box{border-radius:18px;padding:20px 22px;display:flex;align-items:flex-start;gap:16px;position:relative;overflow:hidden;animation:pop .25s cubic-bezier(.2,.9,.3,1.3);}
    @keyframes pop{from{transform:scale(.94);opacity:0}to{transform:none;opacity:1}}
    .status-box.pass{background:linear-gradient(150deg,#fff0fa,#f3e6ff);border:2px solid var(--pink);}
    .status-box.fail{background:#fff0f3;border:2px solid #e01f7a;}
    .stamp{flex-shrink:0;font-size:2.6rem;filter:drop-shadow(0 4px 8px rgba(255,45,182,.4));line-height:1;}
    .status-detail{flex:1;}
    .badge{display:inline-block;font-family:"Fredoka",sans-serif;font-weight:700;font-size:1.25rem;letter-spacing:.3px;
      padding:3px 14px;border-radius:999px;color:#fff;margin-bottom:8px;box-shadow:0 6px 16px -8px rgba(160,30,170,.7);}
    .pass .badge{background:var(--grad);}
    .fail .badge{background:linear-gradient(120deg,#e01f7a,#b3105e);}
    .status-detail .line{font-size:.84rem;color:var(--soft);font-weight:700;margin-top:6px;line-height:1.5;}
    .status-detail .kv{font-family:var(--mono);font-size:.78rem;color:var(--ink);word-break:break-all;background:rgba(255,255,255,.7);
      border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-top:8px;}

    .loading{display:flex;align-items:center;gap:12px;color:var(--soft);font-size:.9rem;font-weight:800;margin-top:16px;}
    .spinner{width:22px;height:22px;border:3px solid var(--line);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .hidden{display:none;}
    .foot{text-align:center;margin-top:22px;font-size:.78rem;color:var(--soft);font-weight:700;}
    .foot a{color:#6a1fd0;font-weight:800;text-decoration:none;}
  </style>
</head>
<body data-screen-label="Verify">
  <div class="card">
    <div class="brand">
      <div class="em">🔥💘</div>
      <h1>Certify Your Rizz</h1>
      <p class="subtitle">
        Paste a transaction hash to prove a rizz was sealed on the Sepolia blockchain.<br>
        <b>Certified Rizz</b> = real, on-chain &amp; timestamped. <b>Fake Rizz</b> = couldn’t be verified.
      </p>
    </div>

    <label for="txInput">Transaction Hash</label>
    <input
      type="text"
      id="txInput"
      placeholder="0x..."
      autocomplete="off"
      spellcheck="false"
    />
    <button id="verifyBtn" onclick="verify()">🔍 Check The Rizz</button>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <span>Sliding into Sepolia to check this rizz…</span>
    </div>

    <div id="result"></div>

    <div class="foot">💘 <a href="index.html">Back to Rizz Me Through The Phone</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <script>
    /* ---------------------------------------------------------------
       VERIFICATION LOGIC — UNCHANGED from the original verify.html.
       Same RPC endpoint, contract address, event ABI and control flow.
       Only the on-screen wording (Certified Rizz / Fake Rizz) and the
       optional ?tx= auto-fill are presentation-layer additions.
       --------------------------------------------------------------- */
    const ALCHEMY_URL     = 'https://eth-sepolia.g.alchemy.com/v2/c-h7TYzFwnL7ugaFXJf2U';
    const CONTRACT_ADDR   = '0xA1bdB7222B244417CCaB6EAeD2cd3d27dADee65A';

    const EVENT_ABI = [
      {
        anonymous: false,
        inputs: [
          { indexed: true,  internalType: 'address', name: 'sender',    type: 'address'  },
          { indexed: false, internalType: 'bytes32', name: 'hash',      type: 'bytes32'  },
          { indexed: false, internalType: 'uint256', name: 'timestamp', type: 'uint256'  }
        ],
        name: 'HashStored',
        type: 'event'
      }
    ];

    async function verify() {
      const txHash  = document.getElementById('txInput').value.trim();
      const btn     = document.getElementById('verifyBtn');
      const loading = document.getElementById('loading');
      const result  = document.getElementById('result');

      result.innerHTML = '';

      if (!txHash) {
        showFail('Please enter a transaction hash.');
        return;
      }

      if (!/^0x[0-9a-fA-F]{64}$/.test(txHash)) {
        showFail('Invalid format — a transaction hash must be 0x followed by 64 hex characters.');
        return;
      }

      btn.disabled = true;
      loading.classList.remove('hidden');

      try {
        const provider = new ethers.JsonRpcProvider(ALCHEMY_URL);
        const receipt  = await provider.getTransactionReceipt(txHash);

        if (!receipt) {
          showFail('Transaction not found on Sepolia. It may not exist or may not yet be mined.');
          return;
        }

        if (receipt.status !== 1) {
          showFail('Transaction was found but it failed (status = 0). No hash was recorded.');
          return;
        }

        const iface = new ethers.Interface(EVENT_ABI);
        let found   = null;

        for (const log of receipt.logs) {
          if (log.address.toLowerCase() !== CONTRACT_ADDR.toLowerCase()) continue;
          try {
            const parsed = iface.parseLog({ topics: Array.from(log.topics), data: log.data });
            if (parsed && parsed.name === 'HashStored') {
              found = parsed;
              break;
            }
          } catch (_) {
            // log belongs to a different event — skip
          }
        }

        if (!found) {
          showFail('Transaction succeeded but no HashStored event was emitted by the contract.');
          return;
        }

        const tsSeconds = Number(found.args.timestamp);
        const date      = new Date(tsSeconds * 1000);
        const dateStr   = date.toUTCString();

        showPass(dateStr, found.args.hash);

      } catch (err) {
        showFail('Error contacting the network: ' + err.message);
      } finally {
        btn.disabled = false;
        loading.classList.add('hidden');
      }
    }

    function showPass(dateStr, hashBytes) {
      const result = document.getElementById('result');
      result.innerHTML = `
        <div class="status-box pass">
          <span class="stamp">💘🔥</span>
          <div class="status-detail">
            <span class="badge">Certified Rizz ✓</span>
            <div class="line">This rizz is <b>100% real</b> — sealed on-chain with a verified timestamp. No cap detected.</div>
            <div class="line">⏱️ Sealed: ${escHtml(dateStr)}</div>
            <div class="kv">🔒 ${escHtml(hashBytes)}</div>
          </div>
        </div>`;
    }

    function showFail(reason) {
      const result = document.getElementById('result');
      result.innerHTML = `
        <div class="status-box fail">
          <span class="stamp">💔🧢</span>
          <div class="status-detail">
            <span class="badge">Fake Rizz ✕</span>
            <div class="line">Couldn’t certify this rizz — it’s giving fugazi.</div>
            <div class="kv">${escHtml(reason)}</div>
          </div>
        </div>`;
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    document.getElementById('txInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') verify();
    });

    // Optional deep-link: /verify?tx=0x...  auto-fills and verifies.
    (function () {
      const tx = new URLSearchParams(location.search).get('tx');
      if (tx) {
        document.getElementById('txInput').value = tx;
        if (/^0x[0-9a-fA-F]{64}$/.test(tx)) verify();
      }
      // floating hearts/flames
      const em = ['💘','🔥','💕','✨','💋'];
      for (let i = 0; i < 7; i++) {
        const s = document.createElement('div');
        s.className = 'floaty';
        s.textContent = em[i % em.length];
        s.style.left = Math.random() * 100 + 'vw';
        s.style.fontSize = (1.2 + Math.random() * 1.6) + 'rem';
        s.style.animationDuration = (9 + Math.random() * 9) + 's';
        s.style.animationDelay = (-Math.random() * 12) + 's';
        document.body.appendChild(s);
      }
    })();
  </script>
</body>
</html>
